<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Mirza | Official Website</title>
  <meta name="description" content="Official website of Random Mirza. The tour Mirza Ki Mehfil is coming soon. Subscribe for updates.">
  <link rel="icon" type="image/png" href="assets/images/Font-PNG.png">
  <link rel="stylesheet" href="css/styles.css">
  <!-- FontAwesome for social icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: linear-gradient(rgba(0,0,0,0.85), rgba(8,8,10,0.95)), url('assets/images/705988744_17906838147421593_311165826440647631_n.jpg') no-repeat center center fixed; background-size: cover;">

  <!-- Decorative blur circles -->
  <div style="position: absolute; top: 10%; left: 10%; width: 300px; height: 300px; background: rgba(197, 168, 128, 0.05); filter: blur(100px); pointer-events: none; z-index: 2;"></div>
  <div style="position: absolute; bottom: 10%; right: 10%; width: 400px; height: 400px; background: rgba(197, 168, 128, 0.03); filter: blur(120px); pointer-events: none; z-index: 2;"></div>

  <main class="coming-soon-main">
    <div class="coming-soon-card">
      <div class="cs-brand">RANDOM MIRZA</div>
      <h1 class="cs-title">MIRZA KI MEHFIL</h1>
      <p class="cs-desc">The official tour schedule is here. We are setting up the main portal. The mehfil begins soon.</p>

      <!-- Countdown -->
      <div class="countdown-container">
        <div class="countdown-box">
          <div id="days" class="countdown-value">00</div>
          <div class="countdown-label">Days</div>
        </div>
        <div class="countdown-box">
          <div id="hours" class="countdown-value">00</div>
          <div class="countdown-label">Hrs</div>
        </div>
        <div class="countdown-box">
          <div id="minutes" class="countdown-value">00</div>
          <div class="countdown-label">Min</div>
        </div>
        <div class="countdown-box">
          <div id="seconds" class="countdown-value">00</div>
          <div class="countdown-label">Sec</div>
        </div>
      </div>

      <!-- Secret portals/social links -->
      <div class="cs-tours-teaser">
        <p>Looking for show dates? <a href="tours/">View Tour Schedule</a></p>
      </div>

      <!-- Social Links -->
      <div class="social-icons" style="justify-content: center; margin-top: 2.5rem;">
        <a href="https://www.instagram.com/random_mirza_/" target="_blank" class="social-icon-link" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      </div>
    </div>
  </main>

  <footer style="border-top: none; background: transparent;">
    <div class="footer-content">
      <div class="footer-credits">
        &copy; 2026 Random Mirza. All rights reserved.
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
